name: Bug report
description: Report a reproducible problem in Across Context.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please avoid posting API keys, tokens, private paths, screenshots with secrets, or full logs with private data.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the problem and what you expected instead.
      placeholder: "After running across-context setup --all --yes, ..."
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: List the smallest commands or actions that reproduce the issue.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Across Context version
      placeholder: "v0.1.0 or commit SHA"
    validations:
      required: false
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "node --version"
    validations:
      required: false
  - type: dropdown
    id: agent
    attributes:
      label: Related agent
      options:
        - Not agent-specific
        - Codex
        - Claude Code
        - Cursor
        - Hermes
        - OpenClaw
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      description: Paste only the smallest relevant log excerpt. Remove secrets and private paths first.
      render: shell
    validations:
      required: false

